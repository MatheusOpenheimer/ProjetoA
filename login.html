<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="CSS/main.css">
    <title>Login</title>
</head>

<body>
    <nav>
        <a href="index.html" class=opcoes id="logo">Logo</a>
        <a href="index.html" class=opcoes>Home</a>
        <a href="planos.html" class=opcoes>Planos</a>
        <a href="#footer" class="opcoes">Contato</a>
        <a href="login.html" class=opcoes id="btn-login">Login</a>
    </nav>

    <main id="main">

        <div class="login_container">
            <div class="blocologin">
                <form>
                    <h1>Login</h1>
                    <div class="input-box">
                        <input placeholder="Usuário" type="email">
                        <i class="bx bxs-user"></i>
                    </div>
                    <div class="input-box">
                        <input placeholder="Senha" type="password">
                        <i class="bx bxs-lock-alt"></i>
                    </div>
                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox">
                            Lembrar Senha
                        </label>
                        <a href="#">Esqueci a senha</a>
                    </div>

                    <button type="submit" class="login">Login</button>

                    <div class="register-link">
                        <p>Não tem uma conta ? <a href="planos.html">Cadastre-se</a></p>
                    </div>
                </form>
            </div>
        </div>
    </main>


    <footer id="footer">
        <div class="message">
            <h1>Mensagem:</h1>
            <input id="name" type="text" placeholder="Nome Completo">
            <input id="email" type="email" placeholder="Email">
            <input id="message" type="text" placeholder="Sua Mensagem">
        </div>
        <div class="redes">
            <i class='bx bxl-instagram'></i>
            <i class='bx bxl-whatsapp'></i>
            <i class='bx bxl-gmail'></i>
        </div>
    </footer>
</body>

</html>
